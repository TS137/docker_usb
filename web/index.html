<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USB Camera Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 16px;
            color: #00d4ff;
        }
        .video-container {
            width: 100%;
            max-width: 960px;
            background: #000;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
        .status-bar {
            width: 100%;
            max-width: 960px;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .status {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status.live {
            background: #00c853;
            color: #fff;
        }
        .status.offline {
            background: #d32f2f;
            color: #fff;
        }
        .status.connecting {
            background: #ffa000;
            color: #fff;
        }
        .info {
            font-size: 0.8rem;
            color: #888;
        }
        @media (max-width: 600px) {
            body { padding: 10px; }
            h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <h1>USB Camera Live Stream</h1>
    <div class="video-container">
        <video id="video" controls autoplay muted playsinline></video>
    </div>
    <div class="status-bar">
        <span id="status" class="status connecting">Connecting...</span>
        <span id="info" class="info"></span>
    </div>

    <script>
        var video = document.getElementById('video');
        var statusEl = document.getElementById('status');
        var infoEl = document.getElementById('info');

        var streamUrl = '/hls/stream.m3u8';

        function updateStatus(state, text) {
            statusEl.className = 'status ' + state;
            statusEl.textContent = text;
        }

        function updateInfo() {
            var now = new Date();
            infoEl.textContent = 'HLS | ' + now.toLocaleTimeString();
        }

        if (Hls.isSupported()) {
            var hls = new Hls({
                enableWorker: false,
                lowLatencyMode: true,
            });

            hls.loadSource(streamUrl);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                updateStatus('live', 'Live');
                video.play().catch(function () {});
                updateInfo();
                setInterval(updateInfo, 5000);
            });

            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            updateStatus('connecting', 'Reconnecting...');
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            updateStatus('connecting', 'Recovering...');
                            hls.recoverMediaError();
                            break;
                        default:
                            updateStatus('offline', 'Stream Offline');
                            hls.destroy();
                            break;
                    }
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', function () {
                updateStatus('live', 'Live (Native)');
                updateInfo();
                setInterval(updateInfo, 5000);
            });
            video.addEventListener('error', function () {
                updateStatus('offline', 'Stream Offline');
            });
        } else {
            updateStatus('offline', 'HLS Not Supported');
        }
    </script>
</body>
</html>
